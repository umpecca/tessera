name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "0"
            ext: ""
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            cgo: "1"
            ext: ""
          - runner: macos-15
            goos: darwin
            goarch: arm64
            cgo: "1"
            ext: ""
          - runner: windows-latest
            goos: windows
            goarch: amd64
            cgo: "0"
            ext: ".exe"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - run: npm run build:web

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go test ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go build -ldflags "-s -w -X tessera/internal/version.Version=${{ github.ref_name }}" -o tessera-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/tessera

      - uses: actions/upload-artifact@v4
        with:
          name: tessera-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tessera-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
